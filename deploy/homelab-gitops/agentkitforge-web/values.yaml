# homelab-gitops values override for the agentkitforge-web chart.
# Referenced as $values/agentkitforge-web/values.yaml by
# bootstrap/agentkitforge-web-chart-app.yaml.
imagePullSecrets:
  - name: ghcr-pull-secret-infisical

web:
  replicas: 1
  image:
    # Pin to a release tag or sha-<short> tag pushed by the image.yml workflow.
    tag: "latest"
  secrets:
    # All secret values come from the Infisical-synced Secret (manifests app).
    existingSecret: agentkitforge-web-secrets
  ingress:
    enabled: true
    className: tailscale
    annotations:
      tailscale.com/proxy-group: ts-ingress
    tls:
      - hosts:
          - agentkitforge-web.tailf14b5e.ts.net

postgres:
  enabled: true
  storage:
    size: 5Gi
    storageClassName: local-path

minio:
  enabled: true
  bucket: agentkitforge-web
  rootUser: minioadmin
  storage:
    size: 10Gi
    storageClassName: local-path
