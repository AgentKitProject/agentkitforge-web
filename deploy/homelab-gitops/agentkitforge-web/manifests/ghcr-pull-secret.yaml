# InfisicalSecret — syncs a GHCR dockerconfigjson pull secret for the PRIVATE
# ghcr.io/agentkitproject/agentkitforge-web image. Mirror the agentkitmarket
# ghcr pull-secret InfisicalSecret exactly (same source key + template).
#
# The referenced Infisical key (e.g. DOCKER_CONFIG_JSON under the appropriate
# path) must contain a valid .dockerconfigjson for ghcr.io. The resulting Secret
# is named `ghcr-pull-secret-infisical` and referenced by imagePullSecrets in the
# chart values override.
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: ghcr-pull-secret-infisical
  namespace: agentkitforge-web
spec:
  resyncInterval: 60
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: ""
        envSlug: prod
        secretsPath: "/k8s/agentkitforge-web"
        recursive: false
      credentialsRef:
        secretName: universal-auth-credentials
        secretNamespace: infisical-operator-system
  managedSecretReference:
    secretName: ghcr-pull-secret-infisical
    secretNamespace: agentkitforge-web
    creationPolicy: Owner
    secretType: kubernetes.io/dockerconfigjson
    # Build the dockerconfigjson from a DOCKER_CONFIG_JSON Infisical key.
    template:
      includeAllSecrets: false
      data:
        .dockerconfigjson: "{{ .DOCKER_CONFIG_JSON.Value }}"
