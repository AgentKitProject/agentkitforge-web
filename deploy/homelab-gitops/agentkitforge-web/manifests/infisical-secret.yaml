# InfisicalSecret — syncs /k8s/agentkitforge-web from the homelab Infisical
# project into a Kubernetes Secret named `agentkitforge-web-secrets`, consumed by
# the Helm chart via web.secrets.existingSecret.
#
# REQUIRED Infisical keys under /k8s/agentkitforge-web (the user must create these;
# the app crashloops / stays pending until they exist — expected):
#   WORKOS_API_KEY
#   WORKOS_CLIENT_ID
#   WORKOS_COOKIE_PASSWORD        (>= 32 chars)
#   AGENTKITFORGE_WEB_SECRET      (AES key / passphrase, 32-byte hex/base64)
#   APP_URL                       (e.g. https://agentkitforge-web.tailf14b5e.ts.net)
#   WORKOS_REDIRECT_URI           (e.g. <APP_URL>/auth/callback)
#   AGENTKITMARKET_BASE_URL
#   POSTGRES_PASSWORD             (bundled Postgres)
#   MINIO_ROOT_PASSWORD           (bundled MinIO; == S3_SECRET_ACCESS_KEY)
# Optional: AGENTKITPROJECT_WORKOS_CLIENT_ID
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: agentkitforge-web-secrets
  namespace: agentkitforge-web
spec:
  resyncInterval: 60
  authentication:
    # Mirror the auth method used by the agentkitmarket InfisicalSecret (the same
    # universalAuth machine-identity credentials Secret in the operator namespace).
    universalAuth:
      secretsScope:
        projectSlug: ""   # leave empty when targeting by projectId via envSlug+path
        envSlug: prod
        secretsPath: "/k8s/agentkitforge-web"
        recursive: false
      credentialsRef:
        secretName: universal-auth-credentials
        secretNamespace: infisical-operator-system
  managedSecretReference:
    secretName: agentkitforge-web-secrets
    secretNamespace: agentkitforge-web
    creationPolicy: Owner
