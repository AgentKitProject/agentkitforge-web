# ArgoCD Application — agentkitforge-web cluster manifests (InfisicalSecret CRs +
# GHCR imagePullSecret). Mirrors bootstrap/agentkitmarket-manifests-app.yaml.
#
# Replace <HOMELAB_GITOPS_REPO_URL> with this repo's URL (match the
# agentkitmarket-manifests-app.yaml repoURL).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agentkitforge-web-manifests
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: agentkitforge-web
  source:
    repoURL: <HOMELAB_GITOPS_REPO_URL>
    targetRevision: main
    path: agentkitforge-web/manifests
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
