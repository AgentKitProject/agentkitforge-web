# ArgoCD Application — agentkitforge-web Helm chart.
#
# Mirrors bootstrap/agentkitmarket-chart-app.yaml. Multi-source:
#   - source 1: the Helm chart at charts/agentkitforge-web in the
#     agentkitforge-web repo (revision main), with valueFiles drawn from $values.
#   - source 2 ($values): the homelab-gitops repo, providing the values override
#     at agentkitforge-web/values.yaml (alongside the existing agentkitmarket/).
#
# Replace <HOMELAB_GITOPS_REPO_URL> below with this repo's URL (match the
# repoURL used by bootstrap/agentkitmarket-chart-app.yaml's $values source).
#
# REPO ACCESS NOTE: github.com/AgentKitProject/agentkitforge-web is PRIVATE.
# ArgoCD must have a repository credential for it (a Repository/repo-creds Secret
# in the argocd namespace with a PAT or deploy key). If Market's chart-app sources
# a public repo, that credential does NOT already exist — add it before this app
# can sync. Without it the app reports "ComparisonError: repository not accessible".
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agentkitforge-web
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: agentkitforge-web
  sources:
    - repoURL: https://github.com/AgentKitProject/agentkitforge-web.git
      targetRevision: main
      path: charts/agentkitforge-web
      helm:
        releaseName: agentkitforge-web
        valueFiles:
          - $values/agentkitforge-web/values.yaml
    - repoURL: <HOMELAB_GITOPS_REPO_URL>
      targetRevision: main
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
