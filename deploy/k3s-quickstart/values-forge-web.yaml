# ===========================================================================
# values-forge-web.yaml — k3s quickstart overlay for the AgentKitForge WebApp.
#
# Layered ON TOP of the chart's own values-k3s.yaml preset:
#   helm install agentkitforge-web ../charts/agentkitforge-web \
#     -f ../charts/agentkitforge-web/values-k3s.yaml \
#     -f values-forge-web.yaml \
#     -f secrets.generated.yaml \    # produced by ./gen-secrets.sh
#     --namespace agentkit
#
# This file carries ONLY non-secret config. The OIDC client secret +
# SESSION_SECRET + AGENTKITFORGE_WEB_SECRET live in secrets.generated.yaml.
#
# Replace <NODE_IP> everywhere first (see ../README.md → `sed`).
# ===========================================================================

web:
  image:
    repository: ghcr.io/agentkitproject/agentkitforge-web
    tag: "latest"

  # Generic OIDC → also flips the instance into self-host mode (SELF_HOST=true).
  auth:
    provider: "oidc"
    oidc:
      # Same PUBLIC issuer browsers and pods use (see dex/dex-values.yaml).
      issuer: "https://dex.<NODE_IP>.nip.io/dex"
      clientId: "agentkitforge-web"
      scopes: "openid profile email"
      # Issuer is HTTPS (Traefik default cert), so allowInsecure stays false.
      allowInsecure: false

  config:
    kitstoreBackend: "selfhost"
    # Public origin → OIDC_REDIRECT_URI auto-derives {appUrl}/auth/callback,
    # which must match the Dex staticClient redirect for agentkitforge-web.
    appUrl: "https://forge.<NODE_IP>.nip.io"
    # Integrate Forge WITH the self-hosted Market: point at the Market ingress
    # so import/favorites resolve against our own Market (NO phone-home to the
    # hosted *.agentkitproject.com ecosystem).
    marketBaseUrl: "https://market.<NODE_IP>.nip.io"
    disableMarket: false
    # Link OUT to the in-cluster AgentKitAuto app (NEXT_PUBLIC_AUTO_URL). Auto is
    # a SEPARATE app/chart (agentkitauto, installed via values-auto.yaml); Forge
    # does not run it.
    ecosystemLinks:
      autoUrl: "https://auto.<NODE_IP>.nip.io"

  ingress:
    enabled: true
    className: "traefik"
    host: "forge.<NODE_IP>.nip.io"
    # No tls: → Traefik's default self-signed cert (see README TLS note).
    tls: []

  # DEV/SMOKE-TEST ONLY — disables TLS verification; do NOT use in production
  # (see TLS section). Traefik serves a self-signed cert on the nip.io hosts, so
  # the Node process would reject Dex's HTTPS issuer during OIDC discovery/token
  # calls. This blunt flag makes Node accept it for the smoke test. The
  # production path is cert-manager + dropping this var (README → Self-signed TLS).
  extraEnv:
    - name: NODE_TLS_REJECT_UNAUTHORIZED
      value: "0"

  # Resolve the ingress hosts straight to the node IP from inside the pod, so
  # pod→ingress OIDC calls don't depend on CNI hairpin NAT (README → Hairpin).
  hostAliases:
    - ip: "<NODE_IP>"
      hostnames:
        - "dex.<NODE_IP>.nip.io"
        - "forge.<NODE_IP>.nip.io"
        - "market.<NODE_IP>.nip.io"
        - "auto.<NODE_IP>.nip.io"

# Bundled Postgres + MinIO on k3s' local-path StorageClass (inherited from the
# chart's values-k3s.yaml; restated for clarity).
postgres:
  enabled: true
  storage:
    storageClassName: local-path
minio:
  enabled: true
  storage:
    storageClassName: local-path
