# ===========================================================================
# secrets.example.yaml — the SHAPE of the secret overlays gen-secrets.sh writes.
#
# DO NOT fill this in by hand and DO NOT commit real values. Run ./gen-secrets.sh
# instead — it mints fresh secrets with `openssl rand` and writes two files:
#
#   secrets.forge.generated.yaml   (the `web.secrets.*` block below)
#   secrets.market.generated.yaml  (web.secrets.* + secrets.adminApiKey)
#
# Both generated files are git-ignored. This example exists only so you can see
# which chart fields each secret maps to.
#
# How each value is made + where it goes:
#
#   openssl rand -hex 32     -> Forge  OIDC client secret  (must equal the
#                               agentkitforge-web Dex staticClient.secret)
#   openssl rand -hex 32     -> Market OIDC client secret  (must equal the
#                               agentkitmarket  Dex staticClient.secret)
#   openssl rand -base64 32  -> SESSION_SECRET   (iron-session cookie seal; >=32 bytes)
#   openssl rand -base64 32  -> AGENTKITFORGE_WEB_SECRET (AES-256-GCM at-rest key
#                               for per-user BYO LLM keys; forge-web only)
#   openssl rand -hex 32     -> ADMIN_API_KEY    (market api/web shared admin key)
# ===========================================================================

# ---- forge-web (-> secrets.forge.generated.yaml) ----
web:
  secrets:
    oidcClientSecret: "REPLACE_openssl_rand_hex_32"   # OIDC_CLIENT_SECRET
    sessionSecret: "REPLACE_openssl_rand_base64_32"   # SESSION_SECRET
    forgeWebSecret: "REPLACE_openssl_rand_base64_32"  # AGENTKITFORGE_WEB_SECRET

# ---- market (-> secrets.market.generated.yaml) ----
# web:
#   secrets:
#     oidcClientSecret: "REPLACE_openssl_rand_hex_32" # OIDC_CLIENT_SECRET (DIFFERENT from forge's)
#     sessionSecret: "REPLACE_openssl_rand_base64_32" # SESSION_SECRET
# secrets:
#   adminApiKey: "REPLACE_openssl_rand_hex_32"        # ADMIN_API_KEY (web tier reuses it)
