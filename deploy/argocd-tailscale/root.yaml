# ===========================================================================
# root.yaml — the app-of-apps. Register THIS ONE Application and it cascades to
# bootstrap + dex + the 3 apps (forge-web, market, auto).
#
#   kubectl apply -f deploy/argocd-tailscale/root.yaml
#
# It points at deploy/argocd-tailscale/apps/ (the child Applications), which run
# in sync-wave order: 0 bootstrap → 1 dex → 2 forge-web/market/auto. See
# ./README.md for the cert chicken-and-egg and the full stand-up walkthrough.
# ===========================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agentkit-selfhost
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/AgentKitProject/agentkitforge-web.git
    targetRevision: main
    path: deploy/argocd-tailscale/apps
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
