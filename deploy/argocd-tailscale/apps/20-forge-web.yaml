# ===========================================================================
# 20-forge-web (sync-wave 2) — the AgentKitForge WebApp.
#
# MULTI-SOURCE Application:
#   - chart source: charts/agentkitforge-web in THIS repo, rendered with our
#     values file pulled via the `$values` ref.
#   - $values ref: this repo, providing the values file path.
# ===========================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agentkit-forge-web
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  sources:
    - repoURL: https://github.com/AgentKitProject/agentkitforge-web.git
      targetRevision: main
      path: charts/agentkitforge-web
      helm:
        valueFiles:
          - $values/deploy/argocd-tailscale/values/values-forge-web.yaml
    - repoURL: https://github.com/AgentKitProject/agentkitforge-web.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: agentkit
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
