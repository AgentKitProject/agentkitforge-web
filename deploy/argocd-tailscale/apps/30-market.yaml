# ===========================================================================
# 30-market (sync-wave 2) — AgentKitMarket (api + worker + web UI).
#
# MULTI-SOURCE Application:
#   - chart source: charts/agentkitmarket in the agentkitmarket-core repo,
#     rendered with our values file pulled via the `$values` ref.
#   - $values ref: the agentkitforge-web repo (where this bundle lives),
#     providing the values file path.
#
# NOTE: release name must be `agentkitmarket` so the web Service resolves to
# agentkitmarket-web (referenced in-cluster by forge-web/auto marketBaseUrl). The
# Application name `agentkit-market` does NOT set the Helm release name — Argo
# derives the release from the Application name, so this Application is
# intentionally named to yield the `agentkitmarket` release.
# ===========================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agentkitmarket
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  sources:
    - repoURL: https://github.com/AgentKitProject/agentkitmarket-core.git
      targetRevision: main
      path: charts/agentkitmarket
      helm:
        valueFiles:
          - $values/deploy/argocd-tailscale/values/values-market.yaml
    - repoURL: https://github.com/AgentKitProject/agentkitforge-web.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: agentkit
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
