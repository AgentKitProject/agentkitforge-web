# ===========================================================================
# secrets.example.yaml — the SHAPE of the plain Kubernetes Secrets you create
# for the ts.net self-host. DO NOT commit real values.
#
# There are TWO independent secret surfaces, and they must AGREE:
#
#   (A) Each app reads its OIDC client secret from its OWN k8s Secret, referenced
#       by web.secrets.existingSecret in that app's values file:
#         forge-web  -> Secret `agentkitforge-web-secret`  key OIDC_CLIENT_SECRET
#         market     -> Secret `agentkitmarket-web-secret` key OIDC_CLIENT_SECRET
#         auto       -> Secret `agentkitauto-web-secret`   key OIDC_CLIENT_SECRET
#
#   (B) Dex must be given the SAME THREE client secrets as the values of its
#       staticClients[].secret (placeholders <FORGE/MARKET/AUTO_OIDC_CLIENT_SECRET>
#       in values/values-dex.yaml).
#
#   *** The client secret for app X in (A) MUST be byte-identical to the
#       staticClient secret for app X in (B). *** If they differ, Dex rejects the
#       token exchange and login fails.
#
# Generate three DIFFERENT strong secrets:
#   FORGE_OIDC_CLIENT_SECRET=$(openssl rand -base64 32)
#   MARKET_OIDC_CLIENT_SECRET=$(openssl rand -base64 32)
#   AUTO_OIDC_CLIENT_SECRET=$(openssl rand -base64 32)
# Plus the Auto inference key (BYO — real spend):
#   ANTHROPIC_API_KEY=sk-ant-...    # your own Anthropic key
#
# ---------------------------------------------------------------------------
# Feed the SAME three values to Dex (surface B). Add them to your own values
# overlay in the $values repo (NOT committed) or pass via --set, e.g.:
#
#   # in a private dex-secrets.yaml referenced alongside values-dex.yaml:
#   config:
#     staticClients:
#       - id: agentkitforge-web
#         secret: "<FORGE_OIDC_CLIENT_SECRET>"
#         # ...redirectURIs as in values-dex.yaml...
#       - id: agentkitmarket
#         secret: "<MARKET_OIDC_CLIENT_SECRET>"
#       - id: agentkitauto
#         secret: "<AUTO_OIDC_CLIENT_SECRET>"
#
# (The simplest path: keep ONE complete dex values file, with the real secrets
# filled in, in a private repo/branch that the 10-dex.yaml $values ref points at.)
# ===========================================================================

# --- (A) forge-web app OIDC client secret -----------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: agentkitforge-web-secret
  namespace: agentkit
type: Opaque
stringData:
  # MUST equal the agentkitforge-web Dex staticClient secret.
  OIDC_CLIENT_SECRET: "<FORGE_OIDC_CLIENT_SECRET>"
  # Optional — chart generates these if absent:
  # SESSION_SECRET: "<openssl rand -base64 32>"
  # AGENTKITFORGE_WEB_SECRET: "<openssl rand -base64 32>"
  # POSTGRES_PASSWORD: "<openssl rand -base64 24>"
  # MINIO_ROOT_PASSWORD: "<openssl rand -base64 24>"
---
# --- (A) market web app OIDC client secret ----------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: agentkitmarket-web-secret
  namespace: agentkit
type: Opaque
stringData:
  # MUST equal the agentkitmarket Dex staticClient secret (DIFFERENT from forge's).
  OIDC_CLIENT_SECRET: "<MARKET_OIDC_CLIENT_SECRET>"
  # Optional — chart generates these if absent:
  # SESSION_SECRET: "<openssl rand -base64 32>"
---
# --- (A) auto web app OIDC client secret + BYO inference key -----------------
apiVersion: v1
kind: Secret
metadata:
  name: agentkitauto-web-secret
  namespace: agentkit
type: Opaque
stringData:
  # MUST equal the agentkitauto Dex staticClient secret (DIFFERENT from the others).
  OIDC_CLIENT_SECRET: "<AUTO_OIDC_CLIENT_SECRET>"
  # BYO Anthropic key — REAL SPEND. Supply your own; do NOT commit it.
  ANTHROPIC_API_KEY: "sk-ant-<your-key>"
  # Optional — chart generates these if absent:
  # SESSION_SECRET: "<openssl rand -base64 32>"
  # AGENTKITFORGE_WEB_SECRET: "<openssl rand -base64 32>"
