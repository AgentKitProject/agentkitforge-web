# ---------------------------------------------------------------------------
# AgentKitForge WebApp — self-host Helm chart (DEFAULT values).
#
# One runtime-configured Next.js standalone image (`node server.js`) with
# KITSTORE_BACKEND=selfhost: kit trees in MinIO/S3, metadata + per-user settings
# in Postgres. Both data services are bundled (in-cluster, persistent) by
# default.
#
# For a turnkey self-host on k3s (generic OIDC, plain k8s Secrets, BYO LLM key,
# Market OFF), use the values-k3s.yaml preset:
#
#   helm install agentkitforge-web ./charts/agentkitforge-web -f values-k3s.yaml \
#     --set web.config.appUrl=https://forge.example.com \
#     --set web.auth.oidc.issuer=https://idp.example.com \
#     --set web.auth.oidc.clientId=... \
#     --set web.secrets.oidcClientSecret=...
#
# In-cluster service URLs (DATABASE_URL, S3_ENDPOINT) auto-default, and all
# remaining secrets (SESSION_SECRET, AGENTKITFORGE_WEB_SECRET, the bundled
# Postgres/MinIO passwords, the Auto service key) are Helm-GENERATED when not
# supplied and PRESERVED across `helm upgrade` — so nothing is `changeme`.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Pull secrets for the container image. The default GHCR image is PUBLIC, so no
# pull secret is needed. Set this only if you mirror the image to a private
# registry.
# ---------------------------------------------------------------------------
imagePullSecrets: []
#  - name: my-registry-pull-secret

# ---------------------------------------------------------------------------
# Web app (the Next.js standalone server)
# ---------------------------------------------------------------------------
web:
  enabled: true
  replicas: 1
  port: 3000
  image:
    repository: ghcr.io/agentkitproject/agentkitforge-web
    # Pin to a release tag (e.g. "v0.1.0") for reproducible deploys. "latest"
    # tracks the default branch.
    tag: "latest"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 768Mi
  service:
    type: ClusterIP
    port: 80

  # Extra env vars merged verbatim into the web container (standard k8s env
  # list). Default empty. Use sparingly — e.g. the k3s smoke test injects
  # NODE_TLS_REJECT_UNAUTHORIZED=0 to accept Traefik's self-signed TLS during
  # OIDC discovery. NEVER disable TLS verification in production.
  extraEnv: []
  # Static /etc/hosts entries for the web pod (standard k8s hostAliases list).
  # Default empty. Used by the k3s smoke test to resolve the ingress nip.io
  # hosts to the node IP when the CNI can't hairpin.
  hostAliases: []

  # --- Authentication (pluggable) ------------------------------------------
  auth:
    # "workos" (hosted SaaS default) | "oidc" (generic OpenID Connect self-host).
    # AUTH_PROVIDER=oidc ALSO marks the instance self-hosted (Market default OFF,
    # BYO-LLM only, ecosystem links hidden unless configured).
    provider: "workos"
    # Explicit self-host opt-in for an OIDC-less self-host (SELF_HOST=true). Not
    # needed when provider=oidc (which implies self-host).
    selfHost: false
    # Generic OIDC settings (used when provider=oidc). The client SECRET is in
    # web.secrets.oidcClientSecret (not here).
    oidc:
      # Discovery (.well-known) base, e.g. https://idp.example.com/realms/main
      issuer: ""
      clientId: ""
      # Defaults to "openid profile email" when empty.
      scopes: ""
      # Dev-only: allow non-TLS (http) issuers. NEVER set true in production.
      allowInsecure: false

  # Non-secret runtime config (ConfigMap).
  config:
    # KitStore adapter. "selfhost" (Postgres + MinIO/S3) for this chart.
    kitstoreBackend: "selfhost"
    # Public origin of the web app (APP_URL / NEXT_PUBLIC_APP_URL). Set this to
    # your public ingress origin so auth redirects resolve.
    appUrl: ""
    # Auth callback URI (WorkOS WORKOS_REDIRECT_URI or OIDC OIDC_REDIRECT_URI).
    # Empty → "<appUrl>/auth/callback".
    redirectUri: ""
    # Base URL of a Market app for import/favorites/licensed flows
    # (AGENTKITMARKET_BASE_URL). EMPTY by default → Market OFF on self-host (no
    # phone-home to the hosted Market). Point it at your OWN Market to enable.
    marketBaseUrl: ""
    # Force ALL Market integration off regardless (DISABLE_MARKET=true).
    disableMarket: false
    # WorkOS client id used by the core market client for device/licensed flows
    # (AGENTKITPROJECT_WORKOS_CLIENT_ID). Optional.
    agentkitprojectWorkosClientId: ""
    # S3/MinIO bucket holding kit trees (S3_BUCKET). Defaults to minio.bucket.
    s3Bucket: ""
    # Optional key prefix within the bucket (S3_PREFIX).
    s3Prefix: ""
    # S3 region (AWS_REGION); us-east-1 is fine for MinIO.
    s3Region: "us-east-1"
    # Ecosystem link overrides (NEXT_PUBLIC_*_URL). On self-host an unset link is
    # HIDDEN. Set these to point at your own properties.
    ecosystemLinks:
      projectUrl: ""
      forgeUrl: ""
      profileUrl: ""
      autoUrl: ""

  # Secret runtime config. Either set inline (use a --values secrets.yaml NOT
  # committed to git) or source from an existing Secret via existingSecret.
  # Anything left empty that the chart can generate (sessionSecret, forgeWebSecret,
  # the DB/MinIO passwords) is Helm-GENERATED and preserved across upgrades.
  secrets:
    # Use an externally-managed Secret instead of the chart-managed one (GitOps).
    # When set, the inline values below are ignored and the web container envFroms
    # it; the bundled Postgres/MinIO read their passwords from it.
    #   Required keys (oidc):  OIDC_CLIENT_SECRET, SESSION_SECRET,
    #     AGENTKITFORGE_WEB_SECRET, POSTGRES_PASSWORD, MINIO_ROOT_PASSWORD
    #   Required keys (workos): WORKOS_API_KEY, WORKOS_CLIENT_ID,
    #     WORKOS_COOKIE_PASSWORD, AGENTKITFORGE_WEB_SECRET, POSTGRES_PASSWORD,
    #     MINIO_ROOT_PASSWORD
    existingSecret: ""

    # --- Generic OIDC (provider=oidc) ---
    # The OIDC client secret (OIDC_CLIENT_SECRET).
    oidcClientSecret: ""
    # iron-session seal secret (SESSION_SECRET, >= 32 chars). GENERATED when empty.
    sessionSecret: ""

    # --- WorkOS AuthKit (provider=workos) ---
    workosApiKey: ""
    workosClientId: ""
    # Must be >= 32 chars. Generate with: openssl rand -base64 32
    workosCookiePassword: ""

    # AES-256-GCM key for at-rest encryption of per-user AI provider keys
    # (AGENTKITFORGE_WEB_SECRET). GENERATED when empty.
    forgeWebSecret: ""

  # Ingress. For k3s the bundled Traefik IngressClass works out of the box; set
  # ingress.enabled=true and a host. (Self-hosters behind Tailscale can set
  # className: tailscale with an empty host instead.)
  ingress:
    enabled: false
    className: ""
    host: ""
    annotations: {}
    tls: []
    #  - hosts:
    #      - forge.example.com

# ---------------------------------------------------------------------------
# AgentKitAuto is a SEPARATE self-host app — it has its OWN Helm chart in the
# agentkitauto-app repo (charts/agentkitauto). Forge only LINKS OUT to it
# via web.config.ecosystemLinks.autoUrl (NEXT_PUBLIC_AUTO_URL); it does not run
# any Auto worker/RBAC/sweep itself.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Bundled in-cluster Postgres (metadata + per-user settings).
# DATABASE_URL auto-defaults to this Service. Disable + provide DATABASE_URL in
# the secret to point at an external instance.
# ---------------------------------------------------------------------------
postgres:
  enabled: true
  image: postgres:16
  database: agentkitforge_web
  user: agentkitforge
  # GENERATED + preserved across upgrades when empty (never "changeme"). Set only
  # to pin a specific password.
  password: ""
  storage:
    size: 5Gi
    storageClassName: local-path

# ---------------------------------------------------------------------------
# Bundled in-cluster MinIO (kit trees).
# S3_ENDPOINT auto-defaults to this Service. Disable + provide S3_* in the secret
# to point at an external S3-compatible store.
# ---------------------------------------------------------------------------
minio:
  enabled: true
  image: minio/minio:latest
  bucket: agentkitforge-web
  # Must equal S3_ACCESS_KEY_ID. The chart sets S3_ACCESS_KEY_ID from this.
  rootUser: minioadmin
  # GENERATED + preserved across upgrades when empty (never "changeme"). Set only
  # to pin a specific password.
  rootPassword: ""
  storage:
    size: 10Gi
    storageClassName: local-path
