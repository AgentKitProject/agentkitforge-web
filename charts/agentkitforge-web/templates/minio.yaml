{{- if .Values.minio.enabled -}}
{{- $secretName := include "agentkitforge-web.webEffectiveSecretName" . -}}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "agentkitforge-web.fullname" . }}-minio-data
  labels:
    {{- include "agentkitforge-web.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.minio.storage.size }}
  {{- if .Values.minio.storage.storageClassName }}
  storageClassName: {{ .Values.minio.storage.storageClassName }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentkitforge-web.fullname" . }}-minio
  labels:
    {{- include "agentkitforge-web.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "agentkitforge-web.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "agentkitforge-web.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: minio
    spec:
      containers:
        - name: minio
          image: {{ .Values.minio.image }}
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              value: {{ .Values.minio.rootUser | quote }}
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: MINIO_ROOT_PASSWORD
                  optional: true
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "agentkitforge-web.fullname" . }}-minio-data
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentkitforge-web.fullname" . }}-minio
  labels:
    {{- include "agentkitforge-web.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  selector:
    app.kubernetes.io/name: {{ include "agentkitforge-web.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: minio
  ports:
    - name: api
      port: 9000
      targetPort: api
    - name: console
      port: 9001
      targetPort: console
{{- end }}
