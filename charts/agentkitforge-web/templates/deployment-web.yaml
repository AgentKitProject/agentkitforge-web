{{- if .Values.web.enabled -}}
{{- $secretName := include "agentkitforge-web.webEffectiveSecretName" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentkitforge-web.fullname" . }}-web
  labels:
    {{- include "agentkitforge-web.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      {{- include "agentkitforge-web.selectorLabelsWeb" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agentkitforge-web.selectorLabelsWeb" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- /* When Auto is enabled the web pod runs under a dedicated SA that has
        RBAC to create Auto worker Jobs (see auto-rbac.yaml). */}}
      {{- if .Values.auto.enabled }}
      serviceAccountName: {{ include "agentkitforge-web.webServiceAccountName" . }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          command: ["node", "server.js"]
          ports:
            - name: http
              containerPort: {{ .Values.web.port }}
              protocol: TCP
          envFrom:
            # Non-secret runtime config.
            - configMapRef:
                name: {{ include "agentkitforge-web.webConfigmapName" . }}
            # All secret values (WorkOS, AGENTKITFORGE_WEB_SECRET, the bundled
            # service passwords + S3 creds). Optional so the chart renders before
            # the external secret exists (the pod will crashloop until it does —
            # expected for GitOps bootstrap).
            - secretRef:
                name: {{ $secretName }}
                optional: true
          env:
            {{- /*
            Auto-compose DATABASE_URL for the bundled Postgres from the secret's
            POSTGRES_PASSWORD, so the secret only needs the password (not the full
            connection string). If you point at an external Postgres, put
            DATABASE_URL directly in the secret — it will override this only if
            you remove this block; otherwise set postgres.enabled=false. */}}
            {{- if .Values.postgres.enabled }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: POSTGRES_PASSWORD
                  optional: true
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgres.user }}:$(POSTGRES_PASSWORD)@{{ include "agentkitforge-web.postgresHost" . }}:5432/{{ .Values.postgres.database }}"
            {{- end }}
            {{- /* S3 access key defaults to the bundled MinIO root user. */}}
            {{- if .Values.minio.enabled }}
            - name: S3_ACCESS_KEY_ID
              value: {{ .Values.minio.rootUser | quote }}
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: MINIO_ROOT_PASSWORD
                  optional: true
            {{- end }}
            {{- /*
            AgentKitAuto self-host config. AUTO_DISPATCH=k8s makes the app
            dispatch each run to a Job (server/core/auto.ts → kubeJobDispatcher).
            The dispatcher forwards most worker env from THIS pod's env (S3/DB are
            already present above), so we add the Auto-specific knobs + the worker
            image/namespace + resources the dispatcher reads as AUTO_K8S_*.
            Secrets (ANTHROPIC_API_KEY, AUTO_WORKER_SERVICE_KEY) come from the
            effective secret. */}}
            {{- if .Values.auto.enabled }}
            - name: AUTO_DISPATCH
              value: "k8s"
            - name: AUTO_SELFHOST_BILLING
              value: {{ .Values.auto.billing | quote }}
            - name: AUTO_K8S_WORKER_IMAGE
              value: {{ .Values.auto.workerImage | quote }}
            - name: AUTO_K8S_NAMESPACE
              value: {{ include "agentkitforge-web.autoNamespace" . | quote }}
            {{- if .Values.auto.worker.cpuRequest }}
            - name: AUTO_K8S_CPU_REQUEST
              value: {{ .Values.auto.worker.cpuRequest | quote }}
            {{- end }}
            {{- if .Values.auto.worker.cpuLimit }}
            - name: AUTO_K8S_CPU_LIMIT
              value: {{ .Values.auto.worker.cpuLimit | quote }}
            {{- end }}
            {{- if .Values.auto.worker.memoryRequest }}
            - name: AUTO_K8S_MEMORY_REQUEST
              value: {{ .Values.auto.worker.memoryRequest | quote }}
            {{- end }}
            {{- if .Values.auto.worker.memoryLimit }}
            - name: AUTO_K8S_MEMORY_LIMIT
              value: {{ .Values.auto.worker.memoryLimit | quote }}
            {{- end }}
            - name: AUTO_K8S_TTL_SECONDS
              value: {{ .Values.auto.worker.ttlSecondsAfterFinished | quote }}
            - name: AUTO_K8S_SCRATCH_SIZE
              value: {{ .Values.auto.worker.scratchSize | quote }}
            # The in-cluster URL the worker re-fetches kit context from.
            - name: WEB_FORGE_INTERNAL_URL
              value: {{ include "agentkitforge-web.webInternalUrl" . | quote }}
            # Service key the worker + sweep present to the internal endpoints.
            - name: AUTO_WORKER_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: AUTO_WORKER_SERVICE_KEY
                  optional: true
            # Anthropic key for managed inference / the operator's BYO key.
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: ANTHROPIC_API_KEY
                  optional: true
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
{{- end }}
