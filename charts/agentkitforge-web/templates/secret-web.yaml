{{- if and .Values.web.enabled (not .Values.web.secrets.existingSecret) -}}
{{- /*
Chart-managed Secret. Holds every genuinely-secret value. Auth-mode-aware:
  - workos: WorkOS AuthKit creds + cookie password.
  - oidc:   the generic-OIDC client secret + the iron-session SESSION_SECRET.
Secrets that are NOT supplied inline are Helm-GENERATED and preserved across
upgrades (see agentkitforge-web.resolveSecret), so a self-hoster never has to
invent SESSION_SECRET / AGENTKITFORGE_WEB_SECRET / DB+MinIO passwords by hand and
`changeme` is never shipped.

In GitOps these come from an external (e.g. Infisical-synced) Secret instead —
set web.secrets.existingSecret and this template is not rendered. */}}
{{- $forgeWebSecret := include "agentkitforge-web.resolveSecret" (dict "ctx" $ "given" .Values.web.secrets.forgeWebSecret "key" "AGENTKITFORGE_WEB_SECRET" "gen" "rand32") -}}
{{- $pgPassword := include "agentkitforge-web.resolveSecret" (dict "ctx" $ "given" .Values.postgres.password "key" "POSTGRES_PASSWORD" "gen" "pw24") -}}
{{- $minioPassword := include "agentkitforge-web.resolveSecret" (dict "ctx" $ "given" .Values.minio.rootPassword "key" "MINIO_ROOT_PASSWORD" "gen" "pw24") -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentkitforge-web.webSecretName" . }}
  labels:
    {{- include "agentkitforge-web.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
type: Opaque
data:
  {{- if eq .Values.web.auth.provider "oidc" }}
  {{- /* Generic OIDC (self-host). The client id is non-secret (configmap); the
    client secret + iron-session SESSION_SECRET live here. SESSION_SECRET is
    generated when unset. */}}
  {{- with .Values.web.secrets.oidcClientSecret }}
  OIDC_CLIENT_SECRET: {{ . | b64enc | quote }}
  {{- end }}
  {{- $sessionSecret := include "agentkitforge-web.resolveSecret" (dict "ctx" $ "given" .Values.web.secrets.sessionSecret "key" "SESSION_SECRET" "gen" "rand32") }}
  SESSION_SECRET: {{ $sessionSecret | b64enc | quote }}
  {{- else }}
  {{- /* WorkOS AuthKit (hosted SaaS). Emit each key only when set so the chart
    renders cleanly before WorkOS is wired. */}}
  {{- with .Values.web.secrets.workosApiKey }}
  WORKOS_API_KEY: {{ . | b64enc | quote }}
  {{- end }}
  {{- with .Values.web.secrets.workosClientId }}
  WORKOS_CLIENT_ID: {{ . | b64enc | quote }}
  {{- end }}
  {{- with .Values.web.secrets.workosCookiePassword }}
  WORKOS_COOKIE_PASSWORD: {{ . | b64enc | quote }}
  {{- end }}
  {{- end }}
  {{- /* AES-256-GCM key for at-rest encryption of per-user AI provider keys.
    Always present (generated when unset). */}}
  AGENTKITFORGE_WEB_SECRET: {{ $forgeWebSecret | b64enc | quote }}
  {{- if .Values.postgres.enabled }}
  POSTGRES_PASSWORD: {{ $pgPassword | b64enc | quote }}
  {{- end }}
  {{- if .Values.minio.enabled }}
  MINIO_ROOT_PASSWORD: {{ $minioPassword | b64enc | quote }}
  {{- end }}
{{- end }}
