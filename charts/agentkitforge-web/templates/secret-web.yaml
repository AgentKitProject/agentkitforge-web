{{- if and .Values.web.enabled (not .Values.web.secrets.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentkitforge-web.webSecretName" . }}
  labels:
    {{- include "agentkitforge-web.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
type: Opaque
data:
  {{- /*
  Emit each key only when set so the chart renders cleanly before a self-hoster
  has wired up WorkOS. In homelab GitOps these come from the external
  (Infisical-synced) Secret instead — set web.secrets.existingSecret and this
  chart-managed Secret is not rendered. */}}
  {{- with .Values.web.secrets.workosApiKey }}
  WORKOS_API_KEY: {{ . | b64enc | quote }}
  {{- end }}
  {{- with .Values.web.secrets.workosClientId }}
  WORKOS_CLIENT_ID: {{ . | b64enc | quote }}
  {{- end }}
  {{- with .Values.web.secrets.workosCookiePassword }}
  WORKOS_COOKIE_PASSWORD: {{ . | b64enc | quote }}
  {{- end }}
  {{- with .Values.web.secrets.forgeWebSecret }}
  AGENTKITFORGE_WEB_SECRET: {{ . | b64enc | quote }}
  {{- end }}
  {{- if .Values.postgres.enabled }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | b64enc | quote }}
  {{- end }}
  {{- if .Values.minio.enabled }}
  MINIO_ROOT_PASSWORD: {{ .Values.minio.rootPassword | b64enc | quote }}
  {{- end }}
{{- end }}
